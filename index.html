<style>

  img{display:block;max-width:100%}
  button{font-family:inherit}
  a{color:inherit;text-decoration:none}
  /* Atmospheric base */
  .atmosphere{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(1100px 700px at 12% 18%, rgba(182,145,64,0.14), transparent 60%),
      radial-gradient(900px 700px at 92% 8%, rgba(35,73,59,0.10), transparent 60%),

      linear-gradient(180deg, #FBF6EC 0%, #F6EFE3 45%, #F1E8D2 100%);
  }
  .grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.35;mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.12 0 0 0 0 0.11 0 0 0 0 0.09 0 0 0 0.08 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  /* ——— Phase 5 polish: a11y, scroll, microinteractions ——— */
  :root{ --ease:cubic-bezier(.22,.61,.36,1); }
  html{ scroll-padding-top:96px; }
  a, button{ -webkit-tap-highlight-color:transparent; }
  :focus{ outline:none; }
  :focus-visible{ outline:2px solid var(--gold-500); outline-offset:3px; border-radius:6px; }
  .cta-press{ transition:transform .28s var(--ease), box-shadow .35s var(--ease), background .3s ease; will-change:transform; }
  .cta-press:active{ transform:translateY(1px) scale(.985) !important; }
  .btn-arrow{ transition:transform .3s var(--ease); }
  .cta-group:hover .btn-arrow{ transform:translateX(4px); }
  .skip-link{ position:fixed; top:-60px; left:16px; z-index:1000; background:var(--forest-700); color:var(--cream-soft);
    padding:10px 18px; border-radius:0 0 12px 12px; font-size:13px; letter-spacing:.04em; transition:top .3s var(--ease); }
  .skip-link:focus{ top:0; }

  /* preloader */
  #preloader{ position:fixed; inset:0; z-index:999; display:grid; place-items:center;
    background:linear-gradient(180deg,#FBF6EC,#F1E8D2); transition:opacity .8s var(--ease), visibility .8s; }
  #preloader.done{ opacity:0; visibility:hidden; }
  #preloader .pl-mark{ width:64px;height:64px;border-radius:50%;overflow:hidden;background:var(--forest-700);
    box-shadow:0 12px 30px -12px rgba(17,38,30,.6), inset 0 0 0 1px rgba(201,168,91,.5); animation:plBreath 2.4s var(--ease) infinite; }
  #preloader .pl-mark img{ width:100%;height:100%;object-fit:cover;transform:scale(1.05); }
  #preloader .pl-track{ width:160px;height:2px;margin-top:28px;border-radius:2px;background:rgba(156,122,44,.22);overflow:hidden; }
  #preloader .pl-fill{ height:100%;width:0;border-radius:2px;background:linear-gradient(90deg,var(--forest-500),var(--gold-500));
    animation:plFill 1.6s var(--ease) forwards; }
  #preloader .pl-word{ margin-top:18px;font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--gold-600); }
  @keyframes plBreath{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
  @keyframes plFill{ 0%{width:0} 100%{width:100%} }

  /* ingredient particles */
  .particles{ position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index:0; }
  .particle{ position:absolute; bottom:-12px; border-radius:50%;
    background:radial-gradient(closest-side, rgba(201,168,91,.85), rgba(201,168,91,0));
    animation:floatUp linear infinite; }
  @keyframes floatUp{
    0%{ transform:translate(0,0); opacity:0 }
    12%{ opacity:.55 } 88%{ opacity:.4 }
    100%{ transform:translate(var(--drift,0), -260px); opacity:0 }
  }

  @media (prefers-reduced-motion: reduce){
    html{ scroll-behavior:auto; }
    .particle{ display:none !important; }
    #preloader .pl-mark{ animation:none; }
  }

<script type="text/babel" data-presets="env,react">
const { motion, AnimatePresence, useScroll, useTransform, useSpring, useMotionValueEvent, useInView, animate, useMotionValue, useReducedMotion } = window.Motion;
const { useState, useEffect, useRef, useMemo } = React;
/* resolve to inlined blob URL when bundled standalone, else the normal path */
const RES = (id, path) => (window.__resources && window.__resources[id]) || path;

/* ---------------------------------------------------------------------- *
 *  NAVBAR — sticky, glassmorphism, shrinks on scroll
 * ---------------------------------------------------------------------- */
function Navbar(){
  const [scrolled, setScrolled] = useState(false);
  const [active, setActive] = useState('');
  const links = [
    ['Problem','problem'],['Solution','solution'],['Audience','audience'],['Story','story'],['Evidence','evidence']
  ];
  useEffect(()=>{
    const ids = links.map(l=>l[1]);
    const onScroll = () => {
      const y = window.scrollY;
      setScrolled(y > 24);
      const mid = y + window.innerHeight*0.32;
      let cur = '';
      for(const id of ids){
        const el = document.getElementById(id);
        if(el && el.offsetTop <= mid) cur = id;
      }
      setActive(cur);
    };
    onScroll();
    window.addEventListener('scroll', onScroll, {passive:true});
    return () => window.removeEventListener('scroll', onScroll);
  },[]);

  return (
    <motion.header
      data-screen-label="Navbar"
      initial={{y:-20, opacity:0}} animate={{y:0, opacity:1}} transition={{duration:0.6, ease:[0.22,0.61,0.36,1]}}
      style={{
        position:'fixed', top:0, left:0, right:0, zIndex:50,
        padding: scrolled ? '10px 48px' : '20px 48px',
        transition:'padding .4s cubic-bezier(.22,.61,.36,1), background .4s, border-color .4s, box-shadow .4s',
        background: scrolled ? 'rgba(251,246,236,0.72)' : 'rgba(251,246,236,0.30)',
        backdropFilter: scrolled ? 'saturate(180%) blur(18px)' : 'saturate(140%) blur(10px)',
        WebkitBackdropFilter: scrolled ? 'saturate(180%) blur(18px)' : 'saturate(140%) blur(10px)',
        borderBottom: scrolled ? '1px solid rgba(31,29,24,0.08)' : '1px solid rgba(31,29,24,0.00)',
        boxShadow: scrolled ? '0 12px 40px -28px rgba(17,38,30,0.35)' : 'none',
      }}
    >
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',maxWidth:1440,margin:'0 auto'}}>
        {/* Brand */}
        <a href="#top" aria-label="Balanced Platter — back to top" style={{display:'flex',alignItems:'center',gap:14}}>
          <motion.div
            animate={{height: scrolled ? 44 : 56, width: scrolled ? 44 : 56}}
            transition={{duration:.4, ease:[.22,.61,.36,1]}}
            style={{borderRadius:'50%', overflow:'hidden', background:'var(--forest-700)', boxShadow:'0 6px 18px -8px rgba(17,38,30,0.6), inset 0 0 0 1px rgba(201,168,91,0.4)'}}
          >
            <img src="assets/logo.webp" alt="" style={{width:'100%',height:'100%',objectFit:'cover',transform:'scale(1.05)'}}/>
          </motion.div>
          <div style={{display:'flex',flexDirection:'column',lineHeight:1}}>
            <span className="serif" style={{fontSize: scrolled ? 19 : 22, color:'var(--forest-700)', fontWeight:500, transition:'font-size .4s'}}>Balanced Platter</span>
            <span style={{fontSize:10, letterSpacing:'0.22em', textTransform:'uppercase', color:'var(--gold-600)', marginTop:4, fontWeight:500}}>Sugar Control Atta</span>
          </div>
        </a>

        {/* Links */}
        <nav aria-label="Primary" style={{display:'flex',alignItems:'center',gap:30}}>
          {links.map(([label,id])=>{
            const on = active===id;
            return (
              <a key={id} href={'#'+id} aria-current={on?'true':undefined}
                 style={{fontSize:13, fontWeight:500, letterSpacing:'0.04em', color: on?'var(--forest-700)':'var(--charcoal)', opacity: on?1:.72, position:'relative', padding:'6px 2px', transition:'opacity .3s, color .3s'}}
                 onMouseEnter={e=>{ if(!on) e.currentTarget.style.opacity=1; }}
                 onMouseLeave={e=>{ if(!on) e.currentTarget.style.opacity=0.72; }}
              >
                {label}
                {on && (
                  <motion.span layoutId="nav-underline"
                    style={{position:'absolute', left:0, right:0, bottom:-2, height:2, borderRadius:2,
                      background:'linear-gradient(90deg, var(--gold-500), var(--forest-500))'}}/>
                )}
              </a>
            );
          })}
          <a href="#sample" className="cta-press" style={{
            display:'inline-flex',alignItems:'center',gap:8,
            padding: scrolled ? '9px 18px' : '11px 22px',
            background:'var(--forest-700)', color:'var(--cream-soft)',
            borderRadius:999, fontSize:13, fontWeight:500, letterSpacing:'0.02em',
            boxShadow:'0 10px 24px -14px rgba(17,38,30,0.55), inset 0 0 0 1px rgba(201,168,91,0.25)'
          }}
          onMouseEnter={e=>e.currentTarget.style.background='var(--forest-900)'}
          onMouseLeave={e=>e.currentTarget.style.background='var(--forest-700)'}>
            <span style={{width:6,height:6,borderRadius:'50%',background:'var(--gold-400)'}}/>
            Sample Pack
          </a>
        </nav>
      </div>
    </motion.header>
  );
}

/* ---------------------------------------------------------------------- *
 *  SCROLL PROGRESS — thin animated bar
 * ---------------------------------------------------------------------- */
function ScrollProgress(){
  const { scrollYProgress } = useScroll();
  const scaleX = useSpring(scrollYProgress, {stiffness:120, damping:24, restDelta:0.001});
  return (
    <div style={{position:'fixed', top:0, left:0, right:0, height:3, zIndex:60, pointerEvents:'none'}}>
      <motion.div style={{
        position:'absolute', inset:0, transformOrigin:'0% 50%',
        background:'linear-gradient(90deg, var(--gold-500), var(--forest-500) 55%, var(--gold-400))',
        boxShadow:'0 0 12px rgba(201,168,91,0.55)', scaleX
      }}/>
      <motion.div style={{
        position:'absolute', top:'50%', left:0, width:'100%', transformOrigin:'0% 50%', scaleX
      }}>
        <span style={{position:'absolute', right:0, top:-3, width:7, height:7, borderRadius:'50%',
          background:'var(--gold-400)', boxShadow:'0 0 10px 2px rgba(201,168,91,0.7)'}}/>
      </motion.div>
    </div>
  );
}

/* ---------------------------------------------------------------------- *
 *  STICKY CTA — bottom-right
 * ---------------------------------------------------------------------- */
function StickyCTA(){
  const [show, setShow] = useState(false);
  useEffect(()=>{
    const on = () => setShow(window.scrollY > 600);
    on();
    window.addEventListener('scroll', on, {passive:true});
    return () => window.removeEventListener('scroll', on);
  },[]);
  const btnRef = useRef(null);
  const mx = useMotionValue(0), my = useMotionValue(0);
  const sx = useSpring(mx, {stiffness:220, damping:18}), sy = useSpring(my, {stiffness:220, damping:18});
  const onMove = (e)=>{
    const el = btnRef.current; if(!el) return;
    const r = el.getBoundingClientRect();
    const dx = e.clientX - (r.left + r.width/2);
    const dy = e.clientY - (r.top + r.height/2);
    mx.set(Math.max(-18, Math.min(18, dx*0.32)));
    my.set(Math.max(-18, Math.min(18, dy*0.32)));
  };
  const onLeave = ()=>{ mx.set(0); my.set(0); };
  return (
    <AnimatePresence>
      {show && (
        <motion.a ref={btnRef} key="sticky-cta" href={SAMPLE_FORM_URL} target="_blank" rel="noopener" aria-label="Request a sample pack (opens form)"
          initial={{opacity:0, scale:.96}}
          animate={{opacity:1, scale:1}}
          exit={{opacity:0, scale:.96}}
          transition={{duration:.5, ease:[.22,.61,.36,1]}}
          onMouseMove={onMove} onMouseLeave={onLeave}
          whileTap={{scale:.97}}
          style={{
            position:'fixed', right:32, bottom:32, zIndex:55, x:sx, y:sy,
            display:'inline-flex', alignItems:'center', gap:12,
            padding:'14px 22px 14px 16px',
            background:'var(--forest-700)', color:'var(--cream-soft)',
            borderRadius:999, fontSize:13, fontWeight:500, letterSpacing:'0.04em',
            boxShadow:'0 24px 60px -22px rgba(17,38,30,0.55), inset 0 0 0 1px rgba(201,168,91,0.35)'
          }}>
          <motion.span
            animate={{scale:[1,1.12,1]}} transition={{duration:2.6, repeat:Infinity, ease:'easeInOut'}}
            style={{
            width:32,height:32,borderRadius:'50%',
            background:'linear-gradient(135deg, var(--gold-400), var(--gold-600))',
            display:'grid', placeItems:'center', color:'var(--forest-900)', fontSize:14
          }}>→</motion.span>
          Request Sample Pack
        </motion.a>
      )}
    </AnimatePresence>
  );
}

/* ---------------------------------------------------------------------- *
 *  HERO
 * ---------------------------------------------------------------------- */
function Hero(){
  const reduced = useReducedMotion();
  const { scrollY } = useScroll();
  // parallax
  const packY    = useTransform(scrollY, [0, 800], [0, 140]);
  const packRot  = useTransform(scrollY, [0, 800], [0, -3]);
  const haloY    = useTransform(scrollY, [0, 800], [0, 90]);
  const copyY    = useTransform(scrollY, [0, 600], [0, -40]);
  const copyOp   = useTransform(scrollY, [0, 500], [1, 0.2]);
  const flourY   = useTransform(scrollY, [0, 800], [0, 80]);

  const reveal = {
    hidden:{opacity:0, y:24},
    show: i => ({opacity:1, y:0, transition:{duration:.9, delay:0.15 + i*0.08, ease:[.22,.61,.36,1]}})
  };

  return (
    <section id="top" data-screen-label="01 Hero" style={{position:'relative', minHeight:'100vh', paddingTop:140, paddingBottom:80, overflow:'hidden'}}>
      {/* atmospheric stone-ground flour backdrop */}
      <motion.div aria-hidden="true" style={{position:'absolute', inset:0, zIndex:0, pointerEvents:'none', y:flourY}}>
        <div style={{position:'absolute', left:0, right:0, bottom:0, height:'58%',
          backgroundImage:'url(' + RES('heroFlour','assets/hero-flour.webp') + ')', backgroundSize:'cover', backgroundPosition:'center 70%',
          opacity:0.55,
          WebkitMaskImage:'linear-gradient(to top, #000 0%, #000 30%, transparent 100%)',
          maskImage:'linear-gradient(to top, #000 0%, #000 30%, transparent 100%)'}}/>
      </motion.div>
      {/* Editorial corner labels */}
      <div style={{position:'absolute', top:120, left:48, fontSize:11, letterSpacing:'0.32em', textTransform:'uppercase', color:'var(--ink-60)', display:'flex', alignItems:'center', gap:14}}>
        <span style={{width:32,height:1,background:'var(--gold-600)'}}/> Vol. 01 — A Quiet Daily Decision
      </div>
      <div style={{position:'absolute', top:120, right:48, fontSize:11, letterSpacing:'0.32em', textTransform:'uppercase', color:'var(--ink-60)'}}>
        Est. 2026 · Hyderabad, IN
      </div>

      {/* faint wheat watermark line */}
      <svg viewBox="0 0 1400 800" preserveAspectRatio="none" style={{position:'absolute', inset:0, width:'100%', height:'100%', opacity:.18, pointerEvents:'none'}}>
        <defs>
          <linearGradient id="wline" x1="0" x2="1">
            <stop offset="0" stopColor="#9C7A2C" stopOpacity="0"/>
            <stop offset=".5" stopColor="#9C7A2C" stopOpacity=".8"/>
            <stop offset="1" stopColor="#9C7A2C" stopOpacity="0"/>
          </linearGradient>
        </defs>
        <path d="M-40,560 C220,540 400,640 700,560 C980,490 1180,600 1480,500" fill="none" stroke="url(#wline)" strokeWidth="1"/>
        <path d="M-40,610 C260,590 460,690 740,610 C1020,540 1220,650 1480,560" fill="none" stroke="url(#wline)" strokeWidth="1"/>
      </svg>

      <div style={{maxWidth:1440, margin:'0 auto', padding:'0 48px', display:'grid', gridTemplateColumns:'1.05fr 1fr', gap:64, alignItems:'center', position:'relative', zIndex:1}}>

        {/* LEFT: editorial copy */}
        <motion.div style={{y:copyY, opacity:copyOp}}>
          <motion.div initial="hidden" animate="show" variants={reveal} custom={0}
            style={{display:'inline-flex',alignItems:'center',gap:10,
              padding:'7px 14px 7px 8px', borderRadius:999,
              background:'rgba(251,246,236,0.6)', border:'1px solid rgba(156,122,44,0.30)',
              fontSize:11, letterSpacing:'0.22em', textTransform:'uppercase', color:'var(--forest-700)', fontWeight:500
            }}>
              <span style={{width:22,height:22,borderRadius:'50%',background:'var(--forest-700)',color:'var(--gold-400)',display:'grid',placeItems:'center',fontSize:10,fontWeight:600}}>BP</span>
              Low GI · 100% Natural
          </motion.div>

          <motion.h1 initial="hidden" animate="show" variants={reveal} custom={1}
            className="serif"
            style={{margin:'28px 0 0', fontSize:88, lineHeight:0.98, letterSpacing:'-0.02em', color:'var(--forest-900)', fontWeight:400, textWrap:'pretty'}}>
            A <em style={{fontStyle:'italic', color:'var(--gold-600)', fontWeight:400}}>smarter</em> flour<br/>
            for blood sugar–<br/>conscious living.
          </motion.h1>

          <motion.p initial="hidden" animate="show" variants={reveal} custom={2}
            style={{maxWidth:520, marginTop:28, fontSize:17, lineHeight:1.55, color:'var(--ink-60)', fontWeight:400}}>
            Balanced Platter Sugar Control Atta is thoughtfully crafted for people who want familiar everyday meals — with smarter nutritional choices baked into the very first bite.
          </motion.p>

          {/* CTAs */}
          <motion.div initial="hidden" animate="show" variants={reveal} custom={3}
            style={{display:'flex', gap:14, marginTop:40, alignItems:'center'}}>
            <a href={SAMPLE_FORM_URL} target="_blank" rel="noopener" className="cta-press cta-group"
              onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)'}}
              onMouseLeave={e=>{e.currentTarget.style.transform='translateY(0)'}}
              style={{
                display:'inline-flex',alignItems:'center',gap:14,
                padding:'16px 14px 16px 26px',
                background:'var(--forest-700)', color:'var(--cream-soft)',
                borderRadius:999, fontSize:14, fontWeight:500, letterSpacing:'0.03em',
                boxShadow:'0 18px 38px -20px rgba(17,38,30,0.7), inset 0 0 0 1px rgba(201,168,91,0.3)'
              }}>
              Request Sample Pack

/* ---------------------------------------------------------------------- *
 *  COUNTER
 * ---------------------------------------------------------------------- */
function Counter({to, duration=2, suffix='', decimals=0, inView}){
  const [val, setVal] = useState(0);
  useEffect(()=>{
    if(!inView) return;
    const ctrl = animate(0, to, {
      duration,
      ease:[.22,.61,.36,1],
      onUpdate: v => setVal(v)
    });
    return ()=>ctrl.stop();
  },[inView, to, duration]);
  const fmt = decimals>0 ? val.toFixed(decimals) : Math.round(val).toLocaleString('en-IN');
  return <span>{fmt}{suffix}</span>;
}

/* ---------------------------------------------------------------------- *

 * ---------------------------------------------------------------------- */
function DiabetesChart({inView}){
  // India diabetes burden, millions — indicative composite of ICMR-INDIAB & IDF figures
  const data = [
    {y:'2000', v:30}, {y:'2005', v:42}, {y:'2010', v:55},
    {y:'2015', v:69}, {y:'2019', v:77}, {y:'2021', v:90}, {y:'2023', v:101}, {y:'2030', v:135}
  ];
  // chart geometry
  const W=540, H=340, P={t:40, r:32, b:48, l:48};
  const maxV = 140;
  const xs = (i) => P.l + (i/(data.length-1)) * (W - P.l - P.r);
  const ys = (v) => H - P.b - (v/maxV) * (H - P.t - P.b);
  const pts = data.map((d,i)=>[xs(i), ys(d.v)]);
  const path = pts.map(([x,y],i)=> i===0?`M${x},${y}`:`L${x},${y}`).join(' ');
  const area = path + ` L${xs(data.length-1)},${H-P.b} L${xs(0)},${H-P.b} Z`;

  const pathRef = useRef(null);
  const [len, setLen] = useState(0);
  useEffect(()=>{ if(pathRef.current) setLen(pathRef.current.getTotalLength()); },[]);

  return (
    <motion.div
      initial={{opacity:0, y:24}}
      animate={inView ? {opacity:1, y:0} : {}}
      transition={{duration:.9, delay:.6, ease:[.22,.61,.36,1]}}
      style={{
        position:'relative', borderRadius:18,
        background:'rgba(251,246,236,0.85)',
        backdropFilter:'blur(10px)',
        border:'1px solid rgba(156,122,44,0.22)',
        boxShadow:'0 30px 60px -30px rgba(82,67,30,0.45)',
        padding:'30px 32px 24px',
        display:'flex', flexDirection:'column'
      }}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:12}}>
        <div>
          <div style={{fontSize:11, letterSpacing:'0.28em', textTransform:'uppercase', color:'var(--gold-600)', fontWeight:500, marginBottom:8}}>Fig. 04 — India · 2000–2030 (projected)</div>
          <h3 className="serif" style={{margin:0, fontSize:28, color:'var(--forest-900)', fontWeight:500, letterSpacing:'-0.01em'}}>The line that won't bend.</h3>
        </div>
        <div style={{display:'flex', gap:14, alignItems:'center'}}>
          <span style={{display:'inline-flex',alignItems:'center',gap:8, fontSize:11, letterSpacing:'0.18em', textTransform:'uppercase', color:'var(--ink-60)'}}>
            <span style={{width:14, height:2, background:'var(--forest-700)'}}/> Diabetic adults (M)
          </span>
        </div>
      </div>

      <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:'block', flex:1}}>
        <defs>
          <linearGradient id="area" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0" stopColor="#23493B" stopOpacity=".28"/>
            <stop offset="1" stopColor="#23493B" stopOpacity="0"/>
          </linearGradient>
          <linearGradient id="line" x1="0" x2="1">
            <stop offset="0" stopColor="#1B3A2F"/>
            <stop offset=".7" stopColor="#23493B"/>
            <stop offset="1" stopColor="#9C7A2C"/>
          </linearGradient>
        </defs>

        {/* gridlines */}
        {[0,35,70,105,140].map((g,i)=>{
          const y = ys(g);
          return (
            <g key={g}>
              <line x1={P.l} x2={W-P.r} y1={y} y2={y} stroke="rgba(31,29,24,0.08)" strokeDasharray="2 4"/>
              <text x={P.l-10} y={y+4} fontSize="10" textAnchor="end" fill="rgba(31,29,24,0.55)" fontFamily="'Hanken Grotesk'">{g}M</text>
            </g>
          );
        })}

        {/* x labels */}
        {data.map((d,i)=>(
          <text key={d.y} x={xs(i)} y={H-P.b+22} fontSize="10" textAnchor="middle" fill="rgba(31,29,24,0.55)" fontFamily="'Hanken Grotesk'">{d.y}</text>
        ))}

        {/* area fill */}
        <motion.path d={area}
          fill="url(#area)"
          initial={{opacity:0}}
          animate={inView ? {opacity:1} : {}}
          transition={{duration:1.4, delay:1.2}}
        />

        {/* main line */}
        <motion.path
          ref={pathRef}
          d={path}
          fill="none"
          stroke="url(#line)"
          strokeWidth="2.2"
          strokeLinecap="round"
          strokeLinejoin="round"
          style={len ? {strokeDasharray:len, strokeDashoffset: inView ? 0 : len} : {}}
          initial={false}
          transition={{duration:2.4, ease:[.22,.61,.36,1], delay:.8}}
        />

        {/* dots */}
        {pts.map(([x,y],i)=>(
          <motion.circle key={i} cx={x} cy={y} r={i===data.length-1 ? 5 : 3.2}
            fill={i===data.length-1 ? '#9C7A2C' : '#1B3A2F'}
            stroke="#FBF6EC" strokeWidth={i===data.length-1 ? 3 : 2}
            initial={{opacity:0, scale:0}}
            animate={inView ? {opacity:1, scale:1} : {}}
            transition={{duration:.5, delay: 0.9 + i*0.18}}
          />
        ))}

        {/* annotation: 2023 */}
        <motion.g initial={{opacity:0}} animate={inView ? {opacity:1} : {}} transition={{delay:2.4, duration:.7}}>
          <line x1={xs(6)} x2={xs(6)} y1={ys(data[6].v)-10} y2={ys(data[6].v)-50} stroke="rgba(156,122,44,0.55)" strokeDasharray="2 3"/>
          <rect x={xs(6)-44} y={ys(data[6].v)-78} width="88" height="28" rx="6" fill="#1B3A2F"/>
          <text x={xs(6)} y={ys(data[6].v)-60} textAnchor="middle" fill="#F6EFE3" fontSize="11" fontFamily="'Hanken Grotesk'" fontWeight="600">2023 · 101M+</text>
        </motion.g>

        {/* annotation: 2030 projected */}
        <motion.g initial={{opacity:0}} animate={inView ? {opacity:1} : {}} transition={{delay:2.7, duration:.7}}>
          <text x={xs(7)} y={ys(data[7].v)-16} textAnchor="end" fill="#9C7A2C" fontSize="11" fontFamily="'Hanken Grotesk'" fontWeight="600">Projected →</text>
        </motion.g>
      </svg>

      <div style={{marginTop:12, paddingTop:14, borderTop:'1px dashed rgba(156,122,44,0.35)', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
        <span style={{fontSize:11, color:'var(--ink-60)', maxWidth:360, lineHeight:1.5}}>
          Illustrative trend — indicative composite of ICMR–INDIAB and IDF estimates. Directional, not a precise forecast.
        </span>
        <span className="serif" style={{fontSize:20, color:'var(--forest-700)', letterSpacing:'-0.01em'}}>+ 4.5× since 2000</span>
      </div>
    </motion.div>
  );
}

/* Whole-screen pointer-driven 3D tilt (cursor anywhere on screen drives it) */
function usePointerTilt({ry=15, rx=10, tx=26}={}){
  const pmx = useMotionValue(0), pmy = useMotionValue(0);
  const rotY  = useSpring(useTransform(pmx, [-1,1], [-ry, ry]), {stiffness:80, damping:18});
  const rotX  = useSpring(useTransform(pmy, [-1,1], [rx, -rx]), {stiffness:80, damping:18});
  const tiltX = useSpring(useTransform(pmx, [-1,1], [-tx, tx]), {stiffness:80, damping:18});
  useEffect(()=>{
    const on = (e)=>{
      pmx.set((e.clientX / window.innerWidth) * 2 - 1);
      pmy.set((e.clientY / window.innerHeight) * 2 - 1);
    };
    window.addEventListener('pointermove', on, {passive:true});
    return ()=> window.removeEventListener('pointermove', on);
  },[]);
  return { rotX, rotY, tiltX };
}

function DailyDecisions({inView}){
  const meals = [
    {x:0.16, t:'Breakfast', s:'Roti · paratha'},
    {x:0.5,  t:'Lunch',     s:'Rice · roti · dal'},
    {x:0.84, t:'Dinner',    s:'Roti · sabzi'},
  ];
  const W=1000, H=240;
  const arc = `M40,${H-50} C ${W*0.28},40 ${W*0.72},40 ${W-40},${H-50}`;
  const px = (f)=> 40 + f*(W-80);
  const py = (f)=> {
    // approximate y on the quadratic-ish arc
    const t=f; const y = (1-t)*(1-t)*(H-50) + 2*(1-t)*t*40 + t*t*(H-50);
    return y;
  };
  return (
    <div style={{marginBottom:76}}>
      <div style={{display:'flex', alignItems:'center', gap:16, marginBottom:8}}>
        <span style={{fontSize:11, letterSpacing:'0.28em', textTransform:'uppercase', color:'var(--gold-600)', fontWeight:500}}>The Daily Rhythm</span>
        <span style={{flex:1, height:1, background:'rgba(156,122,44,0.25)'}}/>
      </div>
      <h3 className="serif" style={{margin:'0 0 8px', fontSize:34, color:'var(--forest-900)', fontWeight:500, letterSpacing:'-0.01em'}}>Food choices happen multiple times, every single day.</h3>
      <p style={{margin:'0 0 28px', maxWidth:560, fontSize:15, lineHeight:1.6, color:'var(--ink-60)'}}>
        Managing blood sugar isn't one annual decision — it's a quiet choice repeated at every meal, in every household.
      </p>
      <div style={{position:'relative', borderRadius:20, background:'var(--cream-soft)', border:'1px solid rgba(156,122,44,0.2)',
        boxShadow:'0 30px 60px -42px rgba(82,67,30,0.4)', padding:'20px 24px'}}>
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:'block'}}>
          <defs>
            <linearGradient id="dayArc" x1="0" x2="1">
              <stop offset="0" stopColor="#9C7A2C"/><stop offset=".5" stopColor="#23493B"/><stop offset="1" stopColor="#9C7A2C"/>
            </linearGradient>
          </defs>
          {/* baseline */}
          <line x1="40" x2={W-40} y1={H-50} y2={H-50} stroke="rgba(31,29,24,0.1)" strokeDasharray="2 5"/>
          {/* arc */}
          <motion.path d={arc} fill="none" stroke="url(#dayArc)" strokeWidth="2"
            initial={{pathLength:0}} animate={inView?{pathLength:1}:{}} transition={{duration:1.8, delay:.3, ease:[.22,.61,.36,1]}}/>
          {/* endpoints labels */}
          <text x="40" y={H-30} fontSize="11" fill="rgba(31,29,24,0.5)" fontFamily="'Hanken Grotesk'">Morning</text>
          <text x={W-40} y={H-30} fontSize="11" textAnchor="end" fill="rgba(31,29,24,0.5)" fontFamily="'Hanken Grotesk'">Night</text>
          {/* meal nodes */}
          {meals.map((m,i)=>{
            const cx=px(m.x), cy=py(m.x);
            return (
              <g key={m.t}>
                <motion.line x1={cx} x2={cx} y1={cy} y2={H-50} stroke="rgba(156,122,44,0.4)" strokeDasharray="2 3"
                  initial={{opacity:0}} animate={inView?{opacity:1}:{}} transition={{delay:1 + i*0.25}}/>
                <motion.circle cx={cx} cy={cy} r="9" fill="var(--forest-700)" stroke="var(--cream-soft)" strokeWidth="3"
                  initial={{scale:0}} animate={inView?{scale:1}:{}} transition={{delay:1 + i*0.25, duration:.5, ease:[.22,.61,.36,1]}}/>
                <motion.g initial={{opacity:0, y:8}} animate={inView?{opacity:1, y:0}:{}} transition={{delay:1.15 + i*0.25, duration:.6}}>
                  <text x={cx} y={cy-22} textAnchor="middle" fontSize="18" fontFamily="'Cormorant Garamond'" fontWeight="500" fill="#11261E">{m.t}</text>
                  <text x={cx} y={cy-4-0} textAnchor="middle" fontSize="0" fill="none">.</text>
                </motion.g>
                <motion.text x={cx} y={H-66} textAnchor="middle" fontSize="11" fontFamily="'JetBrains Mono', monospace" letterSpacing="1" fill="rgba(31,29,24,0.55)"
                  initial={{opacity:0}} animate={inView?{opacity:1}:{}} transition={{delay:1.3 + i*0.25}}>{m.s}</motion.text>
              </g>
            );
          })}
        </svg>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------------------- *
 *  PARTICLES — subtle drifting ingredient motes (reduced-motion safe)
 * ---------------------------------------------------------------------- */
function Particles({count=14}){
  const reduced = useReducedMotion();
  const motes = useMemo(()=> Array.from({length:count}, (_,i)=>({
    left: Math.random()*100,
    size: 3 + Math.random()*6,
    dur: 14 + Math.random()*16,
    delay: -Math.random()*20,
    drift: (Math.random()*60 - 30).toFixed(0)+'px'
  })),[count]);
  if(reduced) return null;
  return (
    <div className="particles" aria-hidden="true">
      {motes.map((m,i)=>(
        <span key={i} className="particle" style={{
          left:m.left+'%', width:m.size, height:m.size,
          animationDuration:m.dur+'s', animationDelay:m.delay+'s', '--drift':m.drift
        }}/>
      ))}
    </div>
  );
}
